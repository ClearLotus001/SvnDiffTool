<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    http-equiv="Content-Security-Policy"
    content="
      default-src 'self';
      script-src 'self' http://localhost:5173;
      connect-src 'self' http://localhost:5173 ws://localhost:5173;
      style-src 'self' 'unsafe-inline';
      font-src 'self' data:;
      img-src 'self' data: blob:;
      worker-src 'self' blob:;
      object-src 'none';
      base-uri 'self';
      frame-ancestors 'none';
    " />
  <title>SvnDiffTool</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { width: 100%; height: 100%; overflow: hidden; }
    body { background: #f4efe6; display: flex; width: 100vw; height: 100vh; }
    #root { flex: 1 1 auto; min-width: 0; min-height: 0; display: flex; }
    /* Custom scrollbar */
    ::-webkit-scrollbar        { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track  { background: var(--scroll-track, transparent); }
    ::-webkit-scrollbar-thumb  { background: var(--scroll-thumb, #4a433d); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--scroll-thumb-hover, #5d544d); }
    input, button, select, textarea { font-family: inherit; }
    /* Prevent text selection during resize drag */
    .no-select { user-select: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
