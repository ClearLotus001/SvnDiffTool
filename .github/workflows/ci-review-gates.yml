name: CI Review Gates

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  review-gates:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Workbook regression tests
        run: npm run test:workbook

      - name: Rust format check
        run: cargo fmt --manifest-path rust/Cargo.toml --check

      - name: Rust clippy
        run: cargo clippy --manifest-path rust/Cargo.toml -- -D warnings

      - name: Full build
        run: npm run build
